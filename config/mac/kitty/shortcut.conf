# 设置
clear_all_shortcuts yes
kitty_mod cmd+ctrl
macos_option_as_alt yes
enabled_layouts splits

####################
##### 通用键位 #####
####################

# 关闭
map cmd+q quit

# 编辑
map cmd+c copy_to_clipboard
map cmd+v paste_from_clipboard

# 显示
map cmd+equal change_font_size all +2.0
map cmd+minus change_font_size all -2.0
map cmd+0 change_font_size all 0

# 复用
map cmd+n new_os_window

# 标签
map cmd+t new_tab
map cmd+shift+[ previous_tab
map cmd+shift+] next_tab
map cmd+w close_tab
map cmd+i set_tab_title

# 滚动
map cmd+up scroll_line_up
map cmd+down scroll_line_down

# 配置文件
map cmd+, edit_config_file

####################
##### 通用增强 #####
####################

# 复用
map cmd+alt+n new_os_window_with_cwd

# 标签
map cmd+alt+t new_tab_with_cwd
map cmd+shift+alt+[ move_tab_forward
map cmd+shift+alt+] move_tab_backward

# 配置文件
map cmd+alt+, load_config_file

#####################
####### Kitty #######
#####################

# 分屏
map kitty_mod+n launch --cwd=current --location=vsplit
map kitty_mod+alt+n launch --cwd=current --location=hsplit
map kitty_mod+] next_window 
map kitty_mod+[ previous_window
map kitty_mod+w close_window
map kitty_mod+r start_resizing_window
map kitty_mod+k move_window up
map kitty_mod+h move_window left
map kitty_mod+l move_window right
map kitty_mod+j move_window down
