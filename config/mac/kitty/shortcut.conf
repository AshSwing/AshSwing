# 初始化
clear_all_shortcuts yes
kitty_mod cmd+ctrl
macos_option_as_alt yes

# 复制粘贴
map cmd+c copy_to_clipboard
map cmd+v paste_from_clipboard

# 字体大小
map cmd+plus change_font_size all +2.0
map cmd+equal change_font_size all +2.0
map shift+cmd+equal change_font_size all +2.0
map cmd+minus change_font_size all -2.0
map shift+cmd+minus change_font_size all -2.0
map cmd+0 change_font_size all 0

# 新建程序
# map kitty_mod+n new_os_window_with_cwd

# 滚屏
map cmd+up scroll_line_up
map cmd+down scroll_line_down
map kitty_mod+up scroll_page_up
map kitty_mod+down scroll_page_down

# 分屏
enabled_layouts splits
map cmd+n launch --cwd=current --location=vsplit
map kitty_mod+n launch --cwd=current --location=hsplit
map cmd+d close_window
map cmd+] next_window 
map cmd+[ previous_window
map cmd+up move_window up
map cmd+left move_window left
map cmd+right move_window right
map cmd+down move_window down
map cmd+r start_resizing_window
map kitty_mod+left resize_window narrower
map kitty_mod+right resize_window wider
map kitty_mod+up resize_window taller
map kitty_mod+down resize_window shorter

# 分页
map cmd+t new_tab_with_cwd
map kitty_mod+] next_tab
map kitty_mod+[ previous_tab
map cmd+w close_tab
map kitty_mod+. move_tab_forward
map kitty_mod+, move_tab_backward
map cmd+i set_tab_title